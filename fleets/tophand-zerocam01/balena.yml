name: tophand-zerocam01
type: sw.application
version: "1.0.0"
description: >-
  Single-camera trail cam fleet. Pi Zero 2 W + IMX708 Camera Module 3.
  Captures images at configurable intervals and uploads to Supabase.
  Future: Quectel BG95 LTE-M modem for cellular connectivity.

assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/etzlertech/balena-pi-camera'

data:
  applicationEnvironmentVariables:
    - CAPTURE_INTERVAL: '300'
    - IMAGE_RESOLUTION: '2304x1296'
    - SUPABASE_BUCKET: 'pi-zero-images'
  
  defaultDeviceType: raspberrypi3-64
  supportedDeviceTypes:
    - raspberrypi3-64
    - raspberrypizero2-64
    - raspberry-pi2
