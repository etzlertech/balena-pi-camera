version: '2.1'

services:
  camera:
    build: ./camera-service
    privileged: true
    restart: always
    network_mode: host
    labels:
      io.balena.features.kernel-modules: '1'
      io.balena.features.firmware: '1'
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
      io.balena.update.strategy: kill-then-download
    volumes:
      - 'captured_images:/data/images'
      - 'uploaded_archive:/data/archive'
    environment:
      - CAPTURE_INTERVAL=300
      - IMAGE_RESOLUTION=2304x1296
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-pi-zero-images}
      - DEVICE_NAME=${BALENA_DEVICE_NAME_AT_INIT}
      - UDEV=on

volumes:
  captured_images:
  uploaded_archive:
