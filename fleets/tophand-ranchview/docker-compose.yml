version: '2.1'

services:
  hello:
    build: ./hello-service
    restart: always
    network_mode: host
    labels:
      io.balena.features.supervisor-api: '1'
      io.balena.update.strategy: kill-then-download
    environment:
      - SITE_SLUG=mark-threadgill
      - HELLO_PORT=8080

  frigate:
    build: ./frigate
    privileged: true
    restart: always
    network_mode: host
    stop_grace_period: 30s
    shm_size: "1gb"
    labels:
      io.balena.features.kernel-modules: '1'
      io.balena.features.firmware: '1'
      io.balena.features.sysfs: '1'
      io.balena.update.strategy: download-then-kill
    volumes:
      - frigate_config:/config
      - frigate_media:/media/frigate
      - frigate_cache:/tmp/cache
    environment:
      - TZ=America/Chicago

  edge-control:
    build:
      context: .
      dockerfile: ./edge-control/Dockerfile
    privileged: true
    restart: always
    network_mode: host
    depends_on:
      - frigate
    labels:
      io.balena.update.strategy: download-then-kill
    environment:
      - TZ=America/Chicago
      - EDGE_CONTROL_PORT=8091
      - TOPHAND_WIFI_INTERNET_ROUTE=1

  tailscale:
    image: tailscale/tailscale:stable
    privileged: true
    restart: always
    network_mode: host
    volumes:
      - tailscale_state:/var/lib/tailscale
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_HOSTNAME=tophand-ranchview-threadgill

  frigate-backup:
    build:
      context: .
      dockerfile: ./frigate-backup/Dockerfile
    restart: always
    network_mode: host
    depends_on:
      - frigate
      - tailscale
    labels:
      io.balena.update.strategy: download-then-kill
    volumes:
      - frigate_media:/media/frigate:ro
      - frigate_backup_state:/var/lib/tophand-backup
    environment:
      - TZ=America/Chicago
      - BACKUP_INTERVAL_SECONDS=300
      - BACKUP_SOURCE=/media/frigate
      - BACKUP_DEST=travis@100.120.124.113:/data/archive/threadgill/frigate-recordings/media/
      - BACKUP_MANIFEST_DEST=travis@100.120.124.113:/data/archive/threadgill/frigate-recordings/manifests/

  frigate-bridge-tunnel:
    build:
      context: .
      dockerfile: ./frigate-bridge-tunnel/Dockerfile
    restart: always
    network_mode: host
    depends_on:
      - frigate
    labels:
      io.balena.update.strategy: download-then-kill
    volumes:
      - frigate_bridge_tunnel_state:/var/lib/tophand-bridge-tunnel
    environment:
      - TZ=America/Chicago
      - BRIDGE_REMOTE=root@89.116.191.85
      - BRIDGE_REMOTE_BIND=127.0.0.1
      - BRIDGE_REMOTE_PORT=15360
      - BRIDGE_LOCAL_HOST=127.0.0.1
      - BRIDGE_LOCAL_PORT=5000
      - BRIDGE_RETRY_SECONDS=15

volumes:
  frigate_config:
  frigate_media:
  frigate_cache:
  frigate_backup_state:
  frigate_bridge_tunnel_state:
  tailscale_state:
