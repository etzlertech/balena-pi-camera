<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RanchView Image Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #b9b9b9;
        }

        .tophand-mode h1 {
            margin-bottom: 4px;
        }

        .tophand-mode .header p {
            color: #d6b56d;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        select {
            background: #333;
            color: #fff;
        }

        button {
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .image-card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .image-card:hover {
            transform: scale(1.02);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
        }

        .tophand-mode .image-card img {
            background: #050505;
            object-fit: contain;
        }

        .image-info {
            padding: 15px;
        }

        .image-name {
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .image-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .tophand-mode .image-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tophand-card-title {
            font-size: 0.98rem;
            font-weight: 700;
            color: #f2f2f2;
            line-height: 1.25;
        }

        .tophand-card-time {
            color: #b9b9b9;
            font-size: 0.86rem;
            line-height: 1.35;
        }

        .vlm-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .vlm-tag {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 8px;
            border: 1px solid rgba(214, 181, 109, 0.32);
            border-radius: 4px;
            background: rgba(214, 181, 109, 0.08);
            color: #e5d1a0;
            font-size: 0.72rem;
            font-weight: 650;
            line-height: 1.2;
        }

        .device-tag {
            display: inline-block;
            padding: 4px 8px;
            background: #4CAF50;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="galleryTitle">🐄 RanchView Image Gallery</h1>
        <p id="gallerySubtitle">All ranch cameras</p>
    </div>

    <div class="controls">
        <select id="deviceFilter">
            <option value="all">All Devices</option>
        </select>
        <select id="sortOrder">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
        </select>
        <button onclick="loadImages()">🔄 Refresh</button>
    </div>

    <div class="stats" id="stats">Loading...</div>

    <div id="gallery" class="gallery"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://dtzayqhebbrbvordmabh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0emF5cWhlYmJyYnZvcmRtYWJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2ODA2NzIsImV4cCI6MjA4NDI1NjY3Mn0.hlDn444h_cxDf7BB3C3e68VrOfXtiljtsIwd0L1iF1w';
        const VIEW_MODES = {
            ranchview: {
                bucket: 'spypoint-images',
                title: '🐄 RanchView Image Gallery',
                subtitle: 'All ranch cameras',
                hiddenTable: 'images'
            },
            tophand: {
                bucket: 'tophand-branded-images',
                title: 'RanchView',
                subtitle: 'by TOPHAND',
                manifestPath: 'manifest.json',
                hiddenTable: null
            }
        };

        const pathName = window.location.pathname.replace(/\/$/, '');
        const viewMode = pathName === '/tophand' ? VIEW_MODES.tophand : VIEW_MODES.ranchview;
        const BUCKET = viewMode.bucket;

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allImages = [];
        let devices = new Set();

        // Friendly camera names mapping
        const cameraNames = {
            'FLEX-M-MGE4': 'Pastucha Hay',
            'FLEX-M-NGEF': 'Back Yard',
            'FLEX-M-RJQM': 'Ainsworth Gate',
            'FLEX-S-DARK-RJQH': 'Cattle Pen',
            'QC': 'Pastucha Pond',
            'QN': 'Donna Trough 1',
            'YV': 'Donna Trough 2'
        };

        // Devices to exclude from viewer
        const excludedDevices = ['Untitled folder', 'test'];

        // Get friendly name or return original
        function getFriendlyName(deviceName) {
            return cameraNames[deviceName] || deviceName;
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function configureViewMode() {
            document.title = viewMode === VIEW_MODES.tophand ? 'RanchView by TOPHAND' : 'RanchView Image Gallery';
            document.getElementById('galleryTitle').textContent = viewMode.title;
            document.getElementById('gallerySubtitle').textContent = viewMode.subtitle;

            if (viewMode === VIEW_MODES.tophand) {
                document.body.classList.add('tophand-mode');
            }
        }

        function parseDateFromFilename(filename) {
            // Parse date from Spypoint filename format: PICTXXXX_S_YYYYMMDDHHMM...
            // Example: PICT3818_S_202603081302zLK0k.jpg -> 2026-03-08 13:02
            // NOTE: Camera times are in LOCAL time (Central), not UTC
            const match = filename.match(/_S?_(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);
            if (match) {
                const [, year, month, day, hour, minute] = match;
                // Parse as local time (no 'Z' suffix) so browser interprets it correctly
                return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`);
            }

            // Fallback: try without _S suffix
            const match2 = filename.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);
            if (match2) {
                const [, year, month, day, hour, minute] = match2;
                return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`);
            }

            return null;
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            const stats = document.getElementById('stats');

            gallery.innerHTML = '<div class="loading">Loading images...</div>';
            stats.textContent = 'Loading...';

            try {
                devices = new Set();

                // Get hidden images from database (if available)
                const hiddenImages = new Set();
                if (viewMode.hiddenTable) {
                    try {
                        const { data: dbImages, error: dbError } = await supabaseClient
                            .from(viewMode.hiddenTable)
                            .select('storage_path')
                            .eq('is_hidden', true);

                        if (!dbError && dbImages) {
                            dbImages.forEach(img => hiddenImages.add(img.storage_path));
                            console.log(`Found ${hiddenImages.size} hidden images in database`);
                        }
                    } catch (e) {
                        console.log('Could not load hidden images list (non-fatal):', e.message);
                    }
                }

                if (viewMode.manifestPath) {
                    const { data: manifestData } = supabaseClient.storage
                        .from(BUCKET)
                        .getPublicUrl(viewMode.manifestPath);

                    const manifestResponse = await fetch(`${manifestData.publicUrl}?t=${Date.now()}`, {
                        cache: 'no-store'
                    });

                    if (manifestResponse.status === 404) {
                        allImages = [];
                        updateDeviceFilter();
                        displayImages();
                        return;
                    }

                    if (!manifestResponse.ok) {
                        throw new Error(`Could not load branded image manifest (${manifestResponse.status})`);
                    }

                    const manifest = await manifestResponse.json();
                    allImages = (manifest.images || [])
                        .filter(image => image.path && !hiddenImages.has(image.path))
                        .map(image => {
                            const name = image.name || image.path.split('/').pop();
                            const device = image.device || image.path.split('/')[0];
                            const parsedDate = parseDateFromFilename(name);
                            const metadata = image.metadata || {};
                            const vlm = image.vlm || metadata.vlm || null;
                            const structuredVlm = vlm && (
                                vlm.animals_detected !== undefined ||
                                vlm.animal_count !== undefined ||
                                vlm.humans_detected !== undefined ||
                                vlm.vehicles_detected !== undefined ||
                                vlm.water_present !== undefined ||
                                vlm.gate_status !== undefined ||
                                vlm.alert_priority !== undefined
                            );

                            devices.add(device);
                            return {
                                name,
                                path: image.path,
                                captured_at: image.captured_at || (parsedDate ? parsedDate.toISOString() : null),
                                device,
                                camera_title: image.camera_title || getFriendlyName(device),
                                temperature_text: image.temperature_text || image.overlay_temperature_text || metadata.overlay_temperature_text || null,
                                analysis: image.analysis || image.vlm_analysis || metadata.analysis || metadata.vlm_analysis || (structuredVlm ? vlm : null)
                            };
                        })
                        .filter(image => image.captured_at);

                    updateDeviceFilter();
                    displayImages();
                    return;
                }

                // Get all files from storage
                const { data, error } = await supabaseClient.storage
                    .from(BUCKET)
                    .list('', {
                        limit: 1000,
                        sortBy: { column: 'created_at', order: 'desc' }
                    });

                if (error) throw error;

                // Get files from all subdirectories
                const allFiles = [];

                // Get top-level folders (device names)
                for (const item of data) {
                    if (item.id === null) { // It's a folder
                        const deviceName = item.name;

                        // Skip excluded devices
                        if (excludedDevices.includes(deviceName)) {
                            continue;
                        }

                        devices.add(deviceName);

                        // List all files recursively in this device folder
                        const files = await listAllFiles(deviceName, '', hiddenImages);
                        allFiles.push(...files);
                    }
                }

                allImages = allFiles;

                // Update device filter
                updateDeviceFilter();

                // Display images
                displayImages();

            } catch (error) {
                gallery.innerHTML = `<div class="error">Error loading images: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }

        async function listAllFiles(prefix, path = '', hiddenImages = new Set()) {
            const fullPath = path ? `${prefix}/${path}` : prefix;
            const files = [];

            const { data, error } = await supabaseClient.storage
                .from(BUCKET)
                .list(fullPath, {
                    limit: 1000,
                    sortBy: { column: 'created_at', order: 'desc' }
                });

            if (error) {
                console.error('Error listing files:', error);
                return files;
            }

            for (const item of data) {
                if (item.id === null) {
                    // It's a folder - skip thumbnail and hd folders
                    const folderName = item.name.toLowerCase();
                    if (!folderName.includes('thumb') && folderName !== 'hd') {
                        const subPath = path ? `${path}/${item.name}` : item.name;
                        const subFiles = await listAllFiles(prefix, subPath, hiddenImages);
                        files.push(...subFiles);
                    }
                } else {
                    // It's a file - skip thumbnails (by name or path)
                    const filePath = path ? `${prefix}/${path}/${item.name}` : `${prefix}/${item.name}`;
                    const isThumbnail = item.name.includes('_thumb') ||
                                       item.name.includes('thumb.') ||
                                       filePath.includes('/thumbnails/') ||
                                       filePath.includes('/thumb/');

                    // Skip if image is marked as hidden in database
                    const isHidden = hiddenImages.has(filePath);

                    if (!isThumbnail && !isHidden) {
                        // Parse capture date from filename, fallback to storage created_at
                        const parsedDate = parseDateFromFilename(item.name);
                        const capturedAt = parsedDate ? parsedDate.toISOString() : item.created_at;

                        files.push({
                            name: item.name,
                            path: filePath,
                            captured_at: capturedAt,
                            device: prefix
                        });
                    }
                }
            }

            return files;
        }

        function formatCaptureDateTime(capturedAt) {
            const date = new Date(capturedAt);
            if (Number.isNaN(date.getTime())) {
                return 'Capture time unavailable';
            }

            return date.toLocaleString([], {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function normalizeSpecies(value) {
            if (!value) return '';
            if (Array.isArray(value)) return value.filter(Boolean).join(', ');
            if (typeof value === 'object') {
                return Object.keys(value)
                    .filter(key => value[key])
                    .join(', ');
            }
            return String(value);
        }

        function titleCase(value) {
            return String(value || '')
                .replace(/[_-]+/g, ' ')
                .replace(/\w\S*/g, word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase());
        }

        function compactPercent(value) {
            if (value === null || value === undefined || value === '') return '';
            const number = Number(value);
            if (Number.isNaN(number)) return String(value);
            return `${Math.round(number)}%`;
        }

        function hasKnownValue(value) {
            if (value === null || value === undefined || value === '') return false;
            return !['unknown', 'none', 'null', 'false'].includes(String(value).toLowerCase());
        }

        function buildVlmTags(image) {
            const analysis = image.analysis || {};
            const tags = [];

            if (image.temperature_text) {
                tags.push(image.temperature_text);
            }

            const animalSpecies = normalizeSpecies(analysis.animal_species || analysis.species);
            if (analysis.animals_detected || analysis.animal_count || animalSpecies) {
                const count = analysis.animal_count ? `${analysis.animal_count} ` : '';
                tags.push(`${count}${animalSpecies || 'animals'}`.trim());
            }

            if (analysis.humans_detected || analysis.human_count) {
                tags.push(analysis.human_count ? `${analysis.human_count} people` : 'People');
            }

            const vehicleTypes = normalizeSpecies(analysis.vehicle_types);
            if (analysis.vehicles_detected || analysis.vehicle_count || vehicleTypes) {
                tags.push(vehicleTypes || (analysis.vehicle_count ? `${analysis.vehicle_count} vehicles` : 'Vehicles'));
            }

            const hasWaterLevel = hasKnownValue(analysis.water_level);
            if (analysis.water_present || hasWaterLevel || (analysis.water_level_percentage !== undefined && analysis.water_level_percentage !== null)) {
                const waterLevel = compactPercent(analysis.water_level_percentage) || titleCase(analysis.water_level);
                tags.push(hasKnownValue(waterLevel) ? `Water ${waterLevel}` : 'Water');
            }

            if (hasKnownValue(analysis.gate_status)) {
                tags.push(`Gate ${titleCase(analysis.gate_status)}`);
            }

            if (analysis.summary || analysis.short_summary) {
                tags.push(String(analysis.summary || analysis.short_summary));
            }

            if (analysis.alert_priority && !['none', 'normal', 'low'].includes(String(analysis.alert_priority).toLowerCase())) {
                tags.push(`Alert ${titleCase(analysis.alert_priority)}`);
            }

            if (analysis.confidence_score !== undefined && analysis.confidence_score !== null) {
                const confidence = Number(analysis.confidence_score);
                if (!Number.isNaN(confidence) && confidence < 0.9) {
                    tags.push(`${Math.round(confidence * (confidence <= 1 ? 100 : 1))}% confidence`);
                }
            }

            return tags
                .filter(Boolean)
                .map(tag => String(tag).trim())
                .filter((tag, index, list) => tag && list.indexOf(tag) === index)
                .slice(0, 4);
        }

        function renderVlmTags(image) {
            const tags = buildVlmTags(image);
            if (!tags.length) return '';
            return `
                <div class="vlm-tags">
                    ${tags.map(tag => `<span class="vlm-tag">${escapeHtml(tag)}</span>`).join('')}
                </div>
            `;
        }

        function updateDeviceFilter() {
            const filter = document.getElementById('deviceFilter');
            const currentValue = filter.value;

            filter.innerHTML = '<option value="all">All Devices</option>';

            Array.from(devices).sort().forEach(device => {
                const option = document.createElement('option');
                option.value = device;
                option.textContent = getFriendlyName(device);
                filter.appendChild(option);
            });

            filter.value = currentValue;
        }

        function displayImages() {
            const gallery = document.getElementById('gallery');
            const stats = document.getElementById('stats');
            const deviceFilter = document.getElementById('deviceFilter').value;
            const sortOrder = document.getElementById('sortOrder').value;

            // Filter images
            let filtered = allImages.filter(img =>
                deviceFilter === 'all' || img.device === deviceFilter
            );

            // Sort images by actual capture time (not upload time)
            filtered.sort((a, b) => {
                const timeA = new Date(a.captured_at).getTime();
                const timeB = new Date(b.captured_at).getTime();
                return sortOrder === 'newest' ? timeB - timeA : timeA - timeB;
            });

            // Update stats
            stats.textContent = `${filtered.length} images from ${devices.size} devices`;

            // Clear gallery
            gallery.innerHTML = '';

            // Display images
            filtered.forEach(image => {
                const card = createImageCard(image);
                gallery.appendChild(card);
            });

            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="loading">No images found</div>';
            }
        }

        function createImageCard(image) {
            const card = document.createElement('div');
            card.className = 'image-card';

            // Get public URL
            const { data } = supabaseClient.storage
                .from(BUCKET)
                .getPublicUrl(image.path);

            const formattedDate = formatCaptureDateTime(image.captured_at);

            if (viewMode === VIEW_MODES.tophand) {
                const cameraTitle = image.camera_title || getFriendlyName(image.device);
                card.innerHTML = `
                    <img src="${data.publicUrl}" alt="${escapeHtml(cameraTitle)} ${escapeHtml(formattedDate)}" onclick="openLightbox('${data.publicUrl}')">
                    <div class="image-info">
                        <div class="tophand-card-title">${escapeHtml(cameraTitle)}</div>
                        <div class="tophand-card-time">${escapeHtml(formattedDate)}</div>
                        ${renderVlmTags(image)}
                    </div>
                `;

                return card;
            }

            card.innerHTML = `
                <img src="${data.publicUrl}" alt="${escapeHtml(image.name)}" onclick="openLightbox('${data.publicUrl}')">
                <div class="image-info">
                    <div class="image-name">${escapeHtml(image.name)}</div>
                    <div class="image-meta">${escapeHtml(formattedDate)}</div>
                    <span class="device-tag">${escapeHtml(getFriendlyName(image.device))}</span>
                </div>
            `;

            return card;
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Event listeners
        document.getElementById('deviceFilter').addEventListener('change', displayImages);
        document.getElementById('sortOrder').addEventListener('change', displayImages);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // Load images on page load
        configureViewMode();
        loadImages();
    </script>
</body>
</html>
